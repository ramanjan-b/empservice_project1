syntax="proto3";
option java_multiple_files=true;
option java_package="payroll";
service PayrollService{
  rpc CalculateBonus(EmployeeDetails) returns (BonusDetails);
}
message EmployeeDetails{
  string id=1;
  string eName=2;
  string mail=3;
}
message BonusDetails{
  string amount=1;
  string quarter=2;
}